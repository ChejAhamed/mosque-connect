[build]
  command = "rm -rf .next && NODE_OPTIONS=--max_old_space_size=4096 bun run netlify-build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NEXT_USE_NETLIFY_EDGE = "true"
  SKIP_TYPESCRIPT_CHECK = "true"
  NEXTJS_IGNORE_TYPECHECK = "true"
  NEXT_IGNORE_ESLINT = "1"
  DATABASE_URI = "mongodb+srv://username:password@cluster0.mongodb.net/mosque-connect?retryWrites=true&w=majority"
  GOOGLE_MAPS_API_KEY = "your-google-maps-api-key"
  NEXTAUTH_SECRET = "your-next-auth-secret"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*"]
